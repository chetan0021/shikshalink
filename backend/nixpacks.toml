[phases.install]
cmds = [
    "python -m venv /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip \"setuptools<78\" wheel",
    ". /opt/venv/bin/activate && pip install openai-whisper==20240930 --no-build-isolation",
    ". /opt/venv/bin/activate && pip install -r requirements.txt"
]
